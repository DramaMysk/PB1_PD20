name: CI Pipeline

on:
  push:

jobs:
  test:
    name: "✅ Testi"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt


      - name: Run tests
        run: pytest


  build:
    name: "🐳 Docker build"
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image (unikāls tags = commit SHA)
        run: |
          docker build -t myapp:${{ github.sha }} .
          echo "Built: myapp:${{ github.sha }}"

      - name: Build Docker image (SemVer simulācija PB1 līmenī)
        run: |
          docker build -t myapp:v1.0.0 .
          echo "Built: myapp:v1.0.0"

# Piezīme:
# Profesionālā vidē šeit sekotu:
# - docker login
# - docker push uz reģistru (Docker Hub / GitHub Container Registry)
# - izvietošana staging / production